name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without v prefix (example: 1.0.0)"
        required: true
      update_major_tag:
        description: "Move major tag (v1, v2...) to this release commit"
        required: true
        default: "true"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must match x.y.z"
            exit 1
          fi

      - name: Create and push release tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          TAG="v${VERSION}"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Move major tag
        if: ${{ inputs.update_major_tag == 'true' }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          MAJOR="v${VERSION%%.*}"
          git tag -f "${MAJOR}" "v${VERSION}"
          git push origin "${MAJOR}" --force

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "speq-github-runner v${VERSION}" \
            --notes "Stable release for speq-github-runner composite action."
