name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- latest
          echo "$PWD" >> "$GITHUB_PATH"
      - name: Validate workflow files
        run: ./actionlint
      - name: Validate action metadata file exists
        run: test -f action.yml
      - name: Bash syntax checks
        run: |
          bash -n scripts/setup.sh
          bash -n scripts/run_mode.sh
          bash -n scripts/custom_mode.sh
          bash -n tests/smoke.sh
      - name: Smoke test action scripts
        run: bash tests/smoke.sh
